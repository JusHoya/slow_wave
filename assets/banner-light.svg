<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="slow_wave — a reproducible test bench for sleep-inspired memory consolidation in LLM agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F8FD"/>
      <stop offset="1" stop-color="#EAF0FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4C79EE"/>
      <stop offset="1" stop-color="#7A5AE0"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1D07E"/>
      <stop offset="1" stop-color="#DCAF4F"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E3BC5C" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#E3BC5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7A8FE8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7A8FE8" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <rect x="228" y="58" width="60" height="60" fill="white"/>
      <circle cx="269" cy="81" r="15" fill="black"/>
    </mask>
  </defs>

  <rect x="1" y="1" width="1278" height="338" rx="18" fill="url(#bg)" stroke="#DEE5F4" stroke-width="1"/>

  <!-- night sky -->
  <g fill="#4C79EE">
    <circle cx="80" cy="80" r="1.5" fill-opacity="0.40"/>
    <circle cx="146" cy="62" r="1.2" fill-opacity="0.34"/>
    <circle cx="208" cy="96" r="1.4" fill-opacity="0.36"/>
    <circle cx="66" cy="252" r="1.2" fill-opacity="0.30"/>
    <circle cx="292" cy="162" r="1.2" fill-opacity="0.30"/>
    <circle cx="248" cy="258" r="1.4" fill-opacity="0.32"/>
  </g>

  <!-- crescent moon -->
  <circle cx="258" cy="88" r="27" fill="url(#moonglow)"/>
  <circle cx="258" cy="88" r="17" fill="url(#moon)" mask="url(#crescent)"/>

  <!-- episodic traces replayed into a durable semantic node -->
  <g fill="#4C79EE">
    <circle cx="92" cy="118" r="3.0" fill-opacity="0.45"/>
    <circle cx="124" cy="100" r="2.6" fill-opacity="0.40"/>
    <circle cx="152" cy="126" r="3.2" fill-opacity="0.45"/>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 7">
    <path d="M 96 122 C 122 152, 152 174, 184 196"/>
    <path d="M 126 104 C 142 142, 162 170, 186 192"/>
    <path d="M 156 130 C 168 154, 178 172, 189 189"/>
  </g>
  <circle cx="192" cy="201" r="22" fill="url(#nodeglow)"/>
  <circle cx="192" cy="201" r="8" fill="url(#accent)"/>
  <circle cx="192" cy="201" r="2.6" fill="#FFFFFF"/>

  <!-- the slow wave, and its downscaled echo -->
  <path d="M 56 226 C 78 190, 100 190, 122 226 S 166 262, 188 226 S 232 190, 254 226 S 290 252, 302 240" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 56 264 C 78 248, 100 248, 122 264 S 166 280, 188 264 S 232 248, 254 264 S 290 276, 302 270" fill="none" stroke="#4C79EE" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>

  <text x="332" y="112" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="19" letter-spacing="3" fill="#7E85AE">PREREGISTERED · MECHANISM-DECOMPOSED · BYTE-REPRODUCIBLE</text>

  <text x="330" y="196" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="-1">
    <tspan fill="#151A2E">slow_</tspan><tspan fill="url(#accent)">wave</tspan>
  </text>

  <text x="333" y="244" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#565F78">A reproducible test bench for sleep-inspired memory consolidation in LLM agents.</text>

  <text x="333" y="284" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="18" fill="#4C6BD8">stream &#8594; wake agent &#8594; dream engine &#8594; verdict&#160;&#160;·&#160;&#160;byte-reproducible with no API key</text>
</svg>
