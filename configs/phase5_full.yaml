# Phase 5 FULL config — the science-scale sweep grid (8 seeds).
#
#   python -m slow_wave.eval.grid --config configs/phase5_full.yaml
#
# Same sweeps as phase5_smoke.yaml, scaled to the Phase 5 floor:
#   * 8 seeds per cell (above the prereg floor of 5; avoids the Phase 4
#     tied-A/A underpowering), varying both stream and sampling seeds (FR5.4);
#   * the three distractor regimes (signal_rich / balanced / distractor_heavy),
#     the registered distractor_heavy mix equalling the base stream label_mix so
#     the primary regime reproduces the eval_full result;
#   * a five-point length sweep [2,3,5,8,12] for the long-context crossover (EC6);
#   * a 12-task real long-horizon vs 3-task accelerated sim agreement (EC3).
# Still mock-LLM / hash-embedding by default, so it is fully deterministic and
# CI-safe; set ANTHROPIC_API_KEY for a real (nondeterministic) run.

experiment: phase5-full
description: Phase 5 sweep grid (full) — regime x arm x seed, length, sim-vs-real.
seed: 13

model:
  id: claude-opus-4-8
  temperature: 0.0
  max_tokens: 64

embedding:
  backend: hash
  model: hash-bow-v1
  dim: 384

sim_time:
  compression_factor: 60.0

stream:
  scenario: task-incremental
  n_tasks: 5
  items_per_task: 40
  label_mix:          # distractor-heavy — equals the registered primary regime
    signal: 0.34
    distractor: 0.40
    noise: 0.26
  contradiction_rate: 0.0
  drift: 0.0
  recency_bias: 0.0
  n_subjects_per_task: 8
  n_attributes: 4
  n_values: 12
  probes_per_task: 6
  distractor_namespace_size: 64
  noise_vocab_size: 128
  noise_tokens: 8

memory:
  episodic_capacity: 60   # bounded => no-sleep forgets; full_dream stays bounded
  archival_enabled: true
  retrieval_policy: recency_importance_relevance
  retrieval_top_k: 16
  recency_half_life: 64.0

agent:
  token_budget: null
  reasoning_calls: per_task

dream:
  enabled: true
  replay_enabled: true
  transfer_enabled: true
  downscale_enabled: true
  augment_enabled: true
  conflict_enabled: false
  sleep_every_n_tasks: 1
  sleep_pressure_mode: fixed
  replay_sample_size: 24
  replay_strategy: prioritized
  transfer_batch_size: 8
  cls_interleave: true
  cls_interleave_ratio: 0.5
  decay_function: exponential
  repotentiate_boost: 1.5
  augment_per_cycle: 4

eval:
  arms:
    - no_sleep
    - replay_only
    - downscale_only
    - random_pruning
    - full_dream
    - reflection
    - oracle
    - long_context
    - aa
  seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  match_budget: true
  budget_tolerance: 0.15
  bootstrap_resamples: 10000
  ci_level: 0.95
  stats_seed: 0
  prereg_path: prereg/preregistration.yaml
  primary_endpoint: acc_diff_full_dream_vs_no_sleep
  stability_repeats: 3
  drift_rounds: 3
  aa_reference_arm: no_sleep
  treatment_arm: full_dream
  baseline_arm: no_sleep

# Phase 5 sweep knobs (free-form hyperparameters block; read by eval/grid.py).
hyperparameters:
  phase5:
    regimes:                                                        # >= 3 (EC1)
      - {name: signal_rich,      signal: 0.70, distractor: 0.20, noise: 0.10}
      - {name: balanced,         signal: 0.50, distractor: 0.30, noise: 0.20}
      - {name: distractor_heavy, signal: 0.34, distractor: 0.40, noise: 0.26}  # registered
    primary_regime: distractor_heavy
    length_sweep:
      lengths: [2, 3, 5, 8, 12]
      key_arms: [full_dream, long_context, no_sleep]
    sim_real:
      key_arms: [full_dream, no_sleep, long_context]
      sim_n_tasks: 3
      sim_compression: 60.0
      real_n_tasks: 12
      real_compression: 1.0

output_dir: runs
