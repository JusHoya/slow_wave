# Phase 2 no-sleep wake-agent FORGETTING config (exit criterion #6).
#
#   python -m slow_wave.agent.runner --config configs/agent_forgetting.yaml
#
# A capacity-bounded episodic store on a noisy stream makes the no-sleep baseline
# demonstrably forget: with no dream cycle there is no consolidation, no semantic
# transfer, and no signal protection, so older task signals are evicted (demoted
# to the archival tier) as newer distractor/noise floods in. The result is a
# measurably NEGATIVE backward transfer (BWT < 0) and average forgetting > 0 —
# the phenomenon the whole project studies.
#
# Sizing (keep this invariant if you edit): items_per_task=30, episodic_capacity=45.
#   - capacity (45) > items_per_task (30): the CURRENT task always fits, so R[t][t]=1.
#   - capacity (45) << cumulative items (120): by the last task, task-0/1 signals are
#     fully evicted, so R[T-1][0] = 0 << R[0][0] = 1  =>  BWT strongly negative.
#   - signal/task = 0.5*30 = 15 fresh probed keys; n_subjects_per_task*n_attributes
#     = 8*4 = 32 >= 15 with contradiction_rate=0.0 (crisp probe set).

experiment: agent-forgetting
description: Phase 2 no-sleep wake agent — capacity-bounded baseline that forgets on a noisy stream.
seed: 13

model:
  id: claude-opus-4-8
  temperature: 0.0
  max_tokens: 64

embedding:
  backend: hash
  model: hash-bow-v1
  dim: 384

sim_time:
  compression_factor: 60.0

stream:
  scenario: task-incremental
  n_tasks: 4
  items_per_task: 30
  label_mix:
    signal: 0.5
    distractor: 0.3
    noise: 0.2
  contradiction_rate: 0.0
  drift: 0.0
  recency_bias: 0.0
  n_subjects_per_task: 8
  n_attributes: 4
  n_values: 12
  probes_per_task: 6
  distractor_namespace_size: 64
  noise_vocab_size: 128
  noise_tokens: 8

memory:
  episodic_capacity: 45   # < cumulative items (120) => old tasks are evicted => forgetting
  archival_enabled: true
  retrieval_policy: recency_importance_relevance
  retrieval_top_k: 16
  recency_half_life: 64.0

agent:
  token_budget: null
  reasoning_calls: per_task

output_dir: runs
