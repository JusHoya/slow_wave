# Phase 3 dream-engine smoke config.
#
# Canonical one-command dream run:
#   python -m slow_wave.dream.runner --config configs/dream_smoke.yaml
# (also wrapped by the Makefile `repro-dream` target).
#
# Small, deterministic, dependency-free (hash embeddings + mock LLM). All four
# dream operators are ON and a cycle runs at the end of every task (gating), so
# the run exercises the full two-phase (NREM: replay->transfer->downscale; REM:
# augment) cycle plus the optional conflict step. The episodic store is bounded
# below the cumulative item count so eviction -> archival demotion is exercised
# and EC7 (a full cycle leaves provenance + archival intact, no hard deletes) is
# a live check rather than a vacuous one.

experiment: dream-smoke
description: Phase 3 dream engine — all four operators on, a cycle every task, over a small task-incremental stream.
seed: 7

model:
  id: claude-opus-4-8
  temperature: 0.0
  max_tokens: 64

embedding:
  backend: hash          # dependency-free, deterministic
  model: hash-bow-v1
  dim: 384

sim_time:
  compression_factor: 60.0

stream:
  scenario: task-incremental
  n_tasks: 3
  items_per_task: 16
  label_mix:
    signal: 0.5
    distractor: 0.3
    noise: 0.2
  contradiction_rate: 0.0
  drift: 0.0
  recency_bias: 0.0
  n_subjects_per_task: 6
  n_attributes: 2
  n_values: 12
  probes_per_task: 4
  distractor_namespace_size: 64
  noise_vocab_size: 128
  noise_tokens: 8

memory:
  episodic_capacity: 24   # < cumulative items (48) => eviction -> archival demotion
  archival_enabled: true
  retrieval_policy: recency_importance_relevance
  retrieval_top_k: 10
  recency_half_life: 64.0

agent:
  token_budget: null
  reasoning_calls: per_task

dream:
  enabled: true
  replay_enabled: true
  transfer_enabled: true
  downscale_enabled: true
  augment_enabled: true
  conflict_enabled: true
  sleep_every_n_tasks: 1
  sleep_pressure_mode: fixed
  replay_sample_size: 12
  replay_strategy: prioritized
  transfer_batch_size: 6
  cls_interleave: true
  cls_interleave_ratio: 0.5
  decay_function: exponential
  repotentiate_boost: 1.5
  augment_per_cycle: 3

output_dir: runs
