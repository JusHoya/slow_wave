# Phase 5 SMOKE config — fast, deterministic, mock-LLM sweep grid.
#
#   python -m slow_wave.eval.grid --config configs/phase5_smoke.yaml
#
# Runs the Phase 5 across-cell sweeps on top of the nine-arm harness:
#   * the arm x distractor-regime x seed grid (EC1) — all three regimes;
#   * the stream-length sweep feeding the long-context crossover (EC6);
#   * the accelerated-sim vs real-long-horizon agreement check (EC3).
# Tiny streams (3 tasks, 14 items/task) and 3 seeds keep CI fast; the science-
# scale grid (8 seeds, the regimes above) lives in configs/phase5_full.yaml. Mock
# LLM + hash embeddings by default, so every number is reproducible bit-for-bit.

experiment: phase5-smoke
description: Phase 5 sweep grid (smoke) — regime x arm x seed, length, sim-vs-real.
seed: 7

model:
  id: claude-opus-4-8
  temperature: 0.0
  max_tokens: 48

embedding:
  backend: hash
  model: hash-bow-v1
  dim: 384

sim_time:
  compression_factor: 60.0

stream:
  scenario: task-incremental
  n_tasks: 3
  items_per_task: 14
  label_mix:          # distractor-heavy — equals the registered primary regime
    signal: 0.34
    distractor: 0.40
    noise: 0.26
  contradiction_rate: 0.0
  drift: 0.0
  recency_bias: 0.0
  n_subjects_per_task: 6
  n_attributes: 4
  n_values: 12
  probes_per_task: 5
  distractor_namespace_size: 48
  noise_vocab_size: 96
  noise_tokens: 8

memory:
  episodic_capacity: 16   # bounded => no-sleep forgets; full_dream stays bounded
  archival_enabled: true
  retrieval_policy: recency_importance_relevance
  retrieval_top_k: 12
  recency_half_life: 64.0

agent:
  token_budget: null
  reasoning_calls: per_task

dream:
  enabled: true
  replay_enabled: true
  transfer_enabled: true
  downscale_enabled: true
  augment_enabled: true
  conflict_enabled: false
  sleep_every_n_tasks: 1
  sleep_pressure_mode: fixed
  replay_sample_size: 16
  replay_strategy: prioritized
  transfer_batch_size: 8
  cls_interleave: true
  cls_interleave_ratio: 0.5
  decay_function: exponential
  repotentiate_boost: 1.5
  augment_per_cycle: 3

eval:
  arms:
    - no_sleep
    - replay_only
    - downscale_only
    - random_pruning
    - full_dream
    - reflection
    - oracle
    - long_context
    - aa
  seeds: [0, 1, 2]
  match_budget: true
  budget_tolerance: 0.15
  bootstrap_resamples: 2000
  ci_level: 0.95
  stats_seed: 0
  prereg_path: prereg/preregistration.yaml
  primary_endpoint: acc_diff_full_dream_vs_no_sleep
  stability_repeats: 3
  drift_rounds: 3
  aa_reference_arm: no_sleep
  treatment_arm: full_dream
  baseline_arm: no_sleep

# Phase 5 sweep knobs (free-form hyperparameters block; read by eval/grid.py).
hyperparameters:
  phase5:
    regimes:                                                        # >= 3 (EC1)
      - {name: signal_rich,      signal: 0.70, distractor: 0.20, noise: 0.10}
      - {name: balanced,         signal: 0.50, distractor: 0.30, noise: 0.20}
      - {name: distractor_heavy, signal: 0.34, distractor: 0.40, noise: 0.26}  # registered
    primary_regime: distractor_heavy
    length_sweep:
      lengths: [2, 3, 4]
      key_arms: [full_dream, long_context, no_sleep]
    sim_real:
      key_arms: [full_dream, no_sleep, long_context]
      sim_n_tasks: 3
      sim_compression: 60.0
      real_n_tasks: 6
      real_compression: 1.0

output_dir: runs
