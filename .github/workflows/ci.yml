name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so git commit hash is available to the manifest.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev only — no heavy ML extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  repro-smoke:
    name: repro-smoke (py3.12, mock LLM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (core + dev only — no heavy ML extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      # No ANTHROPIC_API_KEY is provided, so this exercises the deterministic
      # mock LLM path. Do not reference secrets here — the smoke run must
      # succeed without an API key.
      - name: Run smoke bench
        run: python -m slow_wave.repro.smoke --config configs/smoke.yaml
      - name: Upload smoke manifest
        uses: actions/upload-artifact@v4
        with:
          name: smoke-manifest
          path: runs/smoke/manifest.json
          if-no-files-found: error

  repro-stream:
    name: repro-stream (py3.12, deterministic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (core + dev only — no heavy ML extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      # Phase 1: emit the synthetic continual task stream + datasheet + probe set
      # + R[i,j]. No LLM and no heavy ML deps; fully deterministic.
      - name: Emit synthetic stream
        run: python -m slow_wave.stream.emit --config configs/stream_smoke.yaml
      - name: Upload stream artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stream-artifacts
          path: runs/stream/*.json
          if-no-files-found: error
